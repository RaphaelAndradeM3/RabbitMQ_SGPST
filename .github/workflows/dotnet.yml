name: .NET CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore src/SGPST.slnx

    - name: Build
      run: dotnet build src/SGPST.slnx --no-restore

    - name: Test
      run: dotnet test src/SGPST.slnx --no-restore --verbosity normal
